<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Date Calculator - DevKit</title><meta name="description" content="在线日期计算器 - 日期间隔/加减天数/工作日计算"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;display:flex;flex-direction:column}header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}.logo{font-size:18px;font-weight:700;color:#58a6ff}.logo span{color:#f0c040}header .badge{font-size:10px;background:#daa520;color:#fff;padding:2px 8px;border-radius:10px;margin-left:8px}main{max-width:700px;margin:0 auto;padding:32px 24px;flex:1}.tool-wrapper{padding:20px 0}footer{padding:16px 24px;border-top:1px solid #21262d;text-align:center;font-size:12px;color:#484f58}footer a{color:#58a6ff;text-decoration:none;margin:0 8px}.btn-primary:hover{background:#2ea043!important}.btn:hover{background:#30363d!important}input:focus,textarea:focus,select:focus{outline:none;border-color:#58a6ff!important}.btn{font-family:inherit}</style></head><body><header><div class="logo">🛠 <span>Dev</span>Kit<span class="badge">BETA</span></div><div style="font-size:11px;color:#8b949e">🔒 本地处理 · 数据不上传</div></header><main><h1 style="font-size:24px;margin-bottom:4px">Date Calculator</h1><p style="color:#8b949e;font-size:14px;margin-bottom:8px">在线日期计算器 - 日期间隔/加减天数/工作日计算</p><div class="tool-wrapper"><div style="display:flex;gap:4px;margin-bottom:12px"><button class="tab-btn active" onclick="switchTab('diff')" id="tab-diff" style="flex:1;padding:10px;border:1px solid #58a6ff;border-radius:6px;background:#1a2230;color:#58a6ff;cursor:pointer;font-size:13px;font-weight:600">日期间隔</button><button class="tab-btn" onclick="switchTab('add')" id="tab-add" style="flex:1;padding:10px;border:1px solid #30363d;border-radius:6px;background:#161b22;color:#8b949e;cursor:pointer;font-size:13px;font-weight:600">日期加减</button></div><div id="dc-diff"><div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px"><input type="date" id="dc-from" style="padding:10px;border:1px solid #30363d;border-radius:6px;background:#0d1117;color:#c9d1d9;font-size:14px;outline:none"><span>→</span><input type="date" id="dc-to" style="padding:10px;border:1px solid #30363d;border-radius:6px;background:#0d1117;color:#c9d1d9;font-size:14px;outline:none"></div><div id="dc-diff-result" style="padding:16px;background:#161b22;border:1px solid #30363d;border-radius:8px;text-align:center;font-size:20px;font-weight:700;color:#58a6ff;min-height:60px;display:flex;align-items:center;justify-content:center">选择两个日期</div></div><div id="dc-add" style="display:none"><div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px"><input type="date" id="dc-base" style="padding:10px;border:1px solid #30363d;border-radius:6px;background:#0d1117;color:#c9d1d9;font-size:14px;outline:none"><select id="dc-op" style="padding:10px;border:1px solid #30363d;border-radius:6px;background:#0d1117;color:#c9d1d9;font-size:13px"><option value="add">+ 加</option><option value="sub">- 减</option></select><input type="number" id="dc-num" value="30" min="1" max="3650" style="width:80px;padding:10px;border:1px solid #30363d;border-radius:6px;background:#0d1117;color:#c9d1d9;font-size:14px;outline:none;text-align:center"><select id="dc-unit" style="padding:10px;border:1px solid #30363d;border-radius:6px;background:#0d1117;color:#c9d1d9;font-size:13px"><option value="days">天</option><option value="weeks">周</option><option value="months">月</option><option value="years">年</option></select></div><div id="dc-add-result" style="padding:16px;background:#161b22;border:1px solid #30363d;border-radius:8px;text-align:center;font-size:20px;font-weight:700;color:#3fb950;min-height:60px;display:flex;align-items:center;justify-content:center">选择日期和天数</div></div></div></main><footer><a href="https://github.com/479464887-rgb/date-calc">GitHub</a><span>·</span><span>© 2026 DevKit</span></footer><script>let mode='diff';function switchTab(m){mode=m;['diff','add'].forEach(x=>{document.getElementById('dc-'+x).style.display=x===m?'block':'none';const t=document.getElementById('tab-'+x);t.style.borderColor=x===m?'#58a6ff':'#30363d';t.style.background=x===m?'#1a2230':'#161b22';t.style.color=x===m?'#58a6ff':'#8b949e'})}function calcDiff(){const f=document.getElementById('dc-from').value;const t=document.getElementById('dc-to').value;if(!f||!t){document.getElementById('dc-diff-result').innerHTML='选择两个日期';return}const d1=new Date(f),d2=new Date(t);const diffMs=Math.abs(d2-d1);const days=Math.floor(diffMs/(86400000));const weeks=Math.floor(days/7);const months=(d2.getFullYear()-d1.getFullYear())*12+(d2.getMonth()-d1.getMonth());document.getElementById('dc-diff-result').innerHTML=`相差 <span style=color:#f0c040>${days}</span> 天 (${weeks}周 / 约${Math.abs(months)}个月)`}function calcAdd(){const d=new Date(document.getElementById('dc-base').value);if(isNaN(d.getTime())){document.getElementById('dc-add-result').textContent='选择日期';return}const num=parseInt(document.getElementById('dc-num').value)||0;const unit=document.getElementById('dc-unit').value;const op=document.getElementById('dc-op').value;const sign=op==='add'?1:-1;const r=new Date(d);if(unit==='days')r.setDate(r.getDate()+sign*num);else if(unit==='weeks')r.setDate(r.getDate()+sign*num*7);else if(unit==='months')r.setMonth(r.getMonth()+sign*num);else r.setFullYear(r.getFullYear()+sign*num);const dayNames=['日','一','二','三','四','五','六'];document.getElementById('dc-add-result').innerHTML=`结果: <span style=color:#f0c040>${r.toISOString().split('T')[0]}</span> 星期${dayNames[r.getDay()]}`}['dc-from','dc-to'].forEach(id=>{document.getElementById(id).valueAsDate=new Date();document.getElementById(id).addEventListener('change',calcDiff)});['dc-base','dc-num','dc-unit','dc-op'].forEach(id=>document.getElementById(id).addEventListener('change',calcAdd));document.getElementById('dc-base').valueAsDate=new Date();calcDiff()</script></body></html>
